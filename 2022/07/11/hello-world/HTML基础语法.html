<html>
	<head>
		<title>javaweb基础学习</title>
		<meta charset="UTF-8">
		<style type="text/css">
			div{
				width:200px;
				height:200px;
				position:absolute;
			}
			#div1{
				background-color:#ABC;
				left:500px;
				top:500px;
			}
			#div2{
				background-color:rgb(221, 251, 255);
				left:600px;
				top:600px;
			}
			#div3{
				background-color:#CDF;
				left:700px;
				top:700px;
			}
		</style>
	</head>
	<body>

		你好<br/> 这里是Javaweb基础学习
		<p>这里是第一个段落</p>
		<p>这里是第二个段落</p>
		<img src="imgs/image1.webp" width="650" height="365" alt="这里是一张图片"/>
		<h1>标题一</h1>
		<h2>标题二</h2>
		<h3>标题三</h3>
		<h4>标题四</h4>
		<h5>标题五</h5>
		<h6>标题六</h6>
		
		崩坏三人物名单：
		<ol type="1" start="1">
			<li>芽衣</li>
			<li>琪亚娜</li>
			<li>布洛妮娅</li>
			<li>姬子</li>
		</ol>
		势力组织名称：
		<ul type="circle">
			<li>天命</li>
			<li>逆熵</li>
			<li>崩坏</li>
		</ul>
		<u><b><i>布洛妮娅姐姐，希儿好想你呀！</i></b></u><br/>
		
		水分子的化学式：H<sub>2</sub>O
		2的五次方：2<sup>5</sup>
		
		5&lt;10
		10&gt;5
		11&ge;10
		10&le;11
		
		版权声明：&copy;
		注册商标：&reg;
		
		<br/>
		变成<span>星星</span>吧！<br/>
		画笔臣服于我！<br/>
		
		<a href="https://www.bh3.com" target="_blank">
			崩坏三官网<br/>
			<img src="imgs/image2.png"/>
		</a>
	
		<div id="div1">div1</div>
		<div id="div2">div2</div>
		<div id="div3">div3</div>
	</body>
</html>

<!--
1)
html语言是解释型语言 不是编译型
浏览器是容错的

2)
html页面中由一对标签组成：<html></html>
<html>称之为 开始标签
</html>称之为 结束标签

3)
title 表示网页的标签

4)
可以在meta标签中设置编码方式

5)
<br/>表示换行 br标签是一个单标签 单标签：开始标签和结束标签是同一个 斜杠放在单词后面

6)
<p> 表示段落标签

7)
<img> 标签图片标签
	src属性表示图片文件的路径
	width和height表示图片的大小
	alt表示图片的提示

8)
路径问题：
	1.相对路径
	2.绝对路径

9)
h1-h6 : 标题标签

10)
列表标签:
	ol : 有序列表
		start 表示从*开始 显示标签: A a I i 1
	ul : 无序列表
		type ： disc square circle
		
11)
<b></b> 表示加粗
<i></i> 表示斜体
<u></u>  表示下划线

12)
HTML 实体：参照上述事例

13)
<span></span> 不换行的块标记 在一些标签会自动换行
对围起来的部分进行单独处理 只是单独使用这个标签没有作用
	
14)
<a></a> 表示超链接
	href 网页地址
	target：
		_self 在当前窗口打开
		_blank 在一个新窗口打开
		_top 在顶层窗口打开
		_parent 在父类窗口打开
		
15)
sup 上标 sub 下标

16)
div 层
-->
